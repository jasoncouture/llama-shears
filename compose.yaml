services:
  llamashears:
    build:
      context: .
      dockerfile: Dockerfile
    # Local-only tag by default. To push to a registry, drop a
    # gitignored `compose.override.yaml` next to this file with an
    # alternate `image:` value — compose auto-loads the override.
    image: llama-shears:dev
    container_name: llamashears
    user: root
    ports:
      # Host 5125 matches the dev launchSettings port, so existing
      # bookmarks keep working. Container always serves on 8080.
      - "5125:8080"
    volumes:
      # Bind-mount source is overridable via the LLAMASHEARS_DATA_DIR
      # var. Compose auto-reads the project-root .env for interpolation,
      # so dropping `LLAMASHEARS_DATA_DIR=/abs/path` into .env points the
      # mount wherever you want. Defaults to ./.data when unset. Compose
      # does not expand `~` in interpolated values — use absolute paths.
      - ${LLAMASHEARS_DATA_DIR:-./.data}:/data
    env_file:
      # Both optional. .env is shared defaults; .local.env is per-host
      # overrides (secrets, alternate provider URIs, etc.).
      - path: .env
        required: false
      - path: .local.env
        required: false
    restart: unless-stopped
    # stdin/tty so Ctrl+C reaches the host cleanly when run with
    # `docker compose up` (no `-d`).
    stdin_open: true
    tty: true
