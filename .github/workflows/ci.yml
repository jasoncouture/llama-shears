name: ci

on:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read
  actions: write

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: ./.github/actions/run-tests
