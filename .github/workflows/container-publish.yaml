name: Build/Push Containers
run-name: "${{ github.event_name == 'pull_request' && format('Building container for PR #{0}', github.event.pull_request.number) || format('Publishing container from {0}', github.ref_name) }}"

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read

concurrency:
  group: container-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      version: ${{ steps.version.outputs.semver2 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - id: list
        name: Enumerate bake targets
        uses: docker/bake-action/subaction/matrix@v6

      - id: nbgv
        name: Compute NBGV version
        uses: dotnet/nbgv@master

      - id: version
        name: Sanitise NBGV SemVer2 for OCI tags
        shell: bash
        env:
          RAW: ${{ steps.nbgv.outputs.SemVer2 }}
        run: |
          # SemVer2 may contain '+' (build metadata) which OCI tags
          # reject; '1.0.0+gabc' becomes a legal '1.0.0_gabc'.
          echo "semver2=${RAW//+/_}" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.target }} @ ${{ needs.prepare.outputs.version }}
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: ref
        name: Compute image reference
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          owner_lc=$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${REPO}"   | tr '[:upper:]' '[:lower:]')
          target_lc=$(echo "${TARGET}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/${repo_lc}/${target_lc}" >> "$GITHUB_OUTPUT"
          echo "package=${repo_lc}%2F${target_lc}" >> "$GITHUB_OUTPUT"

      - id: latest
        name: Decide whether this build earns the :latest tag
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ steps.ref.outputs.package }}
          THIS_VER: ${{ needs.prepare.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: ./.github/scripts/decide-latest-tag.sh

      - name: ${{ github.event_name == 'push' && format('Build and push {0} @ {1}', matrix.target, needs.prepare.outputs.version) || format('Build {0} @ {1}', matrix.target, needs.prepare.outputs.version) }}
        uses: ./.github/actions/build-container
        with:
          target: ${{ matrix.target }}
          image: ${{ steps.ref.outputs.image }}
          version: ${{ needs.prepare.outputs.version }}
          tag-latest: ${{ steps.latest.outputs.tag-latest }}
          push: ${{ github.event_name == 'push' && 'true' || 'false' }}
