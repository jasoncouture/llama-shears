name: container-publish
run-name: ${{ github.event_name == 'pull_request' && format('Building container for PR #{0}', github.event.pull_request.number) || format('Publishing container from {0}', github.ref_name) }}

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read
  packages: write

concurrency:
  group: container-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      version: ${{ steps.version.outputs.semver2 }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - id: list
        name: Enumerate bake targets
        uses: docker/bake-action/subaction/matrix@v6

      - id: version
        name: Compute NBGV version
        shell: bash
        run: |
          set -euo pipefail
          dotnet tool install --global nbgv
          export PATH="$PATH:$HOME/.dotnet/tools"
          # SemVer2 may contain '+' (build metadata) which OCI tags reject;
          # replace with '_' so '1.0.0+gabc' becomes a legal '1.0.0_gabc'.
          raw=$(nbgv get-version -v SemVer2)
          sanitized=${raw//+/_}
          echo "semver2=${sanitized}" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.target }} @ ${{ needs.prepare.outputs.version }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: ref
        name: Compute image reference
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          owner_lc=$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')
          repo_lc=$(echo "${REPO}"   | tr '[:upper:]' '[:lower:]')
          target_lc=$(echo "${TARGET}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/${repo_lc}/${target_lc}" >> "$GITHUB_OUTPUT"
          echo "package=${repo_lc}%2F${target_lc}" >> "$GITHUB_OUTPUT"

      - id: latest
        name: Decide whether this build earns the :latest tag
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ steps.ref.outputs.package }}
          THIS_VER: ${{ needs.prepare.outputs.version }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        shell: bash
        run: |
          set -euo pipefail
          flag=false
          # Only release/** pushes ever earn :latest. main pushes are
          # naturally pre-release per NBGV; PR builds don't push at all.
          if [ "${EVENT_NAME}" = "push" ] && [[ "${REF}" == refs/heads/release/* ]]; then
            existing=$(gh api -X GET "/users/${OWNER}/packages/container/${PACKAGE}/versions" --paginate 2>/dev/null \
                       | jq -r '.[].metadata.container.tags[]?' \
                       || true)
            top=$(printf '%s\n%s\n' "${existing}" "${THIS_VER}" \
                  | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
                  | sort -V \
                  | tail -1 || true)
            if [ "${top}" = "${THIS_VER}" ]; then
              flag=true
            fi
          fi
          echo "tag-latest=${flag}" >> "$GITHUB_OUTPUT"

      - name: Build (and conditionally push) ${{ matrix.target }} @ ${{ needs.prepare.outputs.version }}
        uses: ./.github/actions/build-container
        with:
          target: ${{ matrix.target }}
          image: ${{ steps.ref.outputs.image }}
          version: ${{ needs.prepare.outputs.version }}
          tag-latest: ${{ steps.latest.outputs.tag-latest }}
          push: ${{ github.event_name == 'push' && 'true' || 'false' }}
