name: build-container
description: >-
  Build a single Docker bake target. Optionally pushes to the registry
  (GHCR) when `push` is "true". Caller supplies the full set of image
  references via `tags` (newline-separated). The action wires GHA build
  cache automatically.

inputs:
  target:
    description: Bake target name to build.
    required: true
  tags:
    description: Newline-separated full image references to apply to the target.
    required: true
  push:
    description: '"true" to push to the registry, "false" to build only.'
    required: true

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3

    - if: inputs.push == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - shell: bash
      env:
        TARGET: ${{ inputs.target }}
        TAGS: ${{ inputs.tags }}
        PUSH: ${{ inputs.push }}
      run: |
        set -euo pipefail
        sets=()
        while IFS= read -r tag; do
          [ -z "${tag}" ] && continue
          sets+=( "--set" "${TARGET}.tags=${tag}" )
        done <<< "${TAGS}"

        if [ "${PUSH}" = "true" ]; then
          sets+=( "--push" )
        fi

        docker buildx bake \
          --set "${TARGET}.cache-from=type=gha" \
          --set "${TARGET}.cache-to=type=gha,mode=max" \
          "${sets[@]}" \
          "${TARGET}"
