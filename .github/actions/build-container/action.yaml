name: build-container
description: >-
  Build a single Docker bake target via docker/bake-action. Optionally
  pushes to GHCR when `push` is "true". Tag list is computed by
  docker/metadata-action and merged into the existing docker-bake.hcl
  via the action's HCL overlay output — no manual `docker buildx bake`
  invocation, no hand-rolled `--set tags=` plumbing.

inputs:
  target:
    description: Bake target name to build.
    required: true
  image:
    description: 'Fully qualified image reference, e.g. ghcr.io/owner/repo/service. Used as the metadata-action `images` input.'
    required: true
  version:
    description: SemVer2 version (sanitised for OCI) to tag this build with.
    required: true
  tag-latest:
    description: '"true" to additionally tag the image with :latest; "false" to skip.'
    required: false
    default: 'false'
  push:
    description: '"true" to push to the registry, "false" to build only.'
    required: true

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v3

    - if: inputs.push == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - id: meta
      name: Compute image tags for ${{ inputs.target }} @ ${{ inputs.version }}
      uses: docker/metadata-action@v5
      with:
        images: ${{ inputs.image }}
        bake-target: ${{ inputs.target }}
        tags: |
          type=raw,value=${{ inputs.version }}
          type=raw,value=latest,enable=${{ inputs.tag-latest == 'true' }}

    - name: ${{ inputs.push == 'true' && format('Build and push {0} @ {1}', inputs.target, inputs.version) || format('Build {0} @ {1}', inputs.target, inputs.version) }}
      uses: docker/bake-action@v6
      with:
        # v6 defaults to building from the remote git context; force the
        # local checkout so the metadata-action overlay (a local-fs path
        # that doesn't exist in the remote git tree) actually resolves.
        source: .
        files: |
          ./docker-bake.hcl
          ${{ steps.meta.outputs.bake-file }}
        targets: ${{ inputs.target }}
        push: ${{ inputs.push == 'true' }}
        set: |
          ${{ inputs.target }}.cache-from=type=gha
          ${{ inputs.target }}.cache-to=type=gha,mode=max
